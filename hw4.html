<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Assignment</title>
  <link rel="stylesheet" href="./stylehw4.css">
</head>
<body>

<div class="container">
<!-- Row 1 -->
  <h4> EVENT REGISTRATION FORM </h4>

<form>

<!-- Row 2  -->
   <div class="row two">
    <label for="name">Name</label>
    <input type="text" class="name"> 
    <input type="text" class="surname">
   </div>

<!-- Row 3  -->

  <div class="subrow one">
   <span> </span>
   <span class="small firstname"> First Name </span>
   <span class="small lastname"> Last Name </span>
  </div>

<!-- Row 4 -->
   <div class="row four">
   <label> Company </label>
   <input type="text" class="full">
   
   </div>

<!-- Row 5 -->
   <div class="row five">
   <label> Email </label>
   <input type="text" placeholder="example@email.com" class="full">
   </div>

 <!-- Row 6 -->

 <div class="row six">
    <label> Phone</label>
    <input type="text" class="numbcode"> 
    <input type="text" class="numberfull">
   </div>

<!-- Row 7 -->

<div class="subrow seven"> 
 <span></span>
 <span class="small code"> Area Code </span>
 <span class="small number"> Phone Number </span>
</div>

<!-- Row 8 -->

 <div class="row eight">
  <label for="subject"> Subject </label>
  <select class="full"> 
    <option selected disabled>Choose Option</option>
    <option disabled> 1</option>
  </select>
 </div>

<!-- Row 9 -->

<p>Are you an existing customer?</p>

<!-- Row 10 -->
 <div class="row ten">
  <label class="radio-line"> 
  <input type="radio" name="customer" checked> Yes  </label>
   <label class="radio-line"> 
    <input type="radio" name="customer"> No
  </label>
 </div>

 <!-- Row 11 -->
  <button> REGISTER </button>

</form>
</div>

  
</body>
</html>
